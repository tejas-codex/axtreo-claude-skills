name: Sync commands from axtreo-app

on:
  repository_dispatch:
    types: [sync-commands]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy updated commands
        run: |
          mkdir -p commands
          echo '${{ toJson(github.event.client_payload.files) }}' > /tmp/payload.json
          # Files are base64-encoded content keyed by filename
          node -e "
            const payload = require('/tmp/payload.json');
            const fs = require('fs');
            for (const [name, content] of Object.entries(payload)) {
              fs.writeFileSync('commands/' + name, Buffer.from(content, 'base64').toString('utf8'));
              console.log('Written: commands/' + name);
            }
          "

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commands/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "sync: update commands from axtreo-app"
          git push
